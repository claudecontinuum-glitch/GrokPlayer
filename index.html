<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrokPlayer</title>
    <link rel="stylesheet" href="/src/ui/playerChrome.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>GrokPlayer</h1>
        <p class="tagline">Tu música local. Starship synthwave. Humanos y agentes.</p>
      </header>

      <main class="player-shell" id="player-shell">
        <div class="player-bezel">
          <div class="screw screw-tl"></div>
          <div class="screw screw-tr"></div>
          <div class="screw screw-bl"></div>
          <div class="screw screw-br"></div>

          <div class="lcd-frame">
            <div class="lcd-screen">
              <canvas id="visual-canvas" aria-label="Visualizador Starship 3D"></canvas>
              <div class="lcd-overlay">
                <span id="track-title" class="lcd-title">Sin pista</span>
                <span id="track-artist" class="lcd-artist">Arrastra archivos o pulsa Abrir</span>
              </div>
            </div>
          </div>

          <div class="transport">
            <button type="button" id="btn-prev" class="btn-transport" aria-label="Anterior">⏮</button>
            <button type="button" id="btn-play" class="btn-transport btn-play" aria-label="Reproducir">▶</button>
            <button type="button" id="btn-next" class="btn-transport" aria-label="Siguiente">⏭</button>
          </div>

          <div class="progress-row">
            <span id="time-current" class="time">0:00</span>
            <input type="range" id="seek" class="seek" min="0" max="100" value="0" aria-label="Posición" />
            <span id="time-total" class="time">0:00</span>
          </div>

          <div class="controls-row">
            <label class="vol-label">
              Vol
              <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85" />
            </label>
            <label class="file-label">
              <input type="file" id="file-input" accept="audio/*" multiple hidden />
              <span class="btn-file">Abrir música</span>
            </label>
            <button type="button" id="btn-session" class="btn-secondary">Sesión</button>
          </div>

          <div class="bands-debug" id="bands-debug" aria-hidden="true">
            <div class="band-bar"><span>B</span><div class="bar"><i id="bar-bass"></i></div></div>
            <div class="band-bar"><span>M</span><div class="bar"><i id="bar-mid"></i></div></div>
            <div class="band-bar"><span>A</span><div class="bar"><i id="bar-high"></i></div></div>
          </div>
        </div>

        <aside class="queue-panel">
          <h2>Cola</h2>
          <ol id="queue-list" class="queue-list"></ol>
        </aside>
      </main>

      <section class="session-panel hidden" id="session-panel">
        <h2>Sesión compartida</h2>
        <p class="session-hint">Exporta o pega JSON para que Hermes (u otro agente) co-pilote la escucha.</p>
        <textarea id="session-json" rows="10" spellcheck="false"></textarea>
        <div class="session-actions">
          <button type="button" id="btn-export-session">Exportar</button>
          <button type="button" id="btn-import-session">Aplicar sesión</button>
          <button type="button" id="btn-close-session">Cerrar</button>
        </div>
      </section>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
